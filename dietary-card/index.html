<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dietary & Allergy Card - Food Translation</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6117526240662405" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>🍽️ Dietary Card</h1>
        <p>Food Communication Tool</p>
        
        <div class="lang-selector">
            <button class="lang-btn active" onclick="changeLanguage('en', event)">English</button>
            <button class="lang-btn" onclick="changeLanguage('ja', event)">日本語</button>
            <button class="lang-btn" onclick="changeLanguage('zh', event)">中文</button>
            <button class="lang-btn" onclick="changeLanguage('th', event)">ภาษาไทย</button>
            <button class="lang-btn" onclick="changeLanguage('ru', event)">Русский</button>
            <button class="lang-btn" onclick="changeLanguage('vi', event)">Tiếng Việt</button>
        </div>
    </header>

    <div class="ad-container">AdSense Banner</div>

    <main>
        <div class="category-tabs" id="category-tabs">
            <!-- Categories rendered here -->
        </div>

        <div class="phrase-list" id="phrase-list">
            <!-- Phrases rendered here -->
        </div>
    </main>

    <!-- Modal for showing Korean text -->
    <div class="korean-modal" id="korean-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-label" id="modal-label">Please read this:</div>
            <div class="warning-icon">⚠️</div>
            <div class="korean-text" id="korean-text">한국어 번역이 이곳에 표시됩니다.</div>
            <div class="original-text" id="original-text">Original text here</div>
        </div>
    </div>

    <footer>
        <a href="../index.html">← Back to Main</a>
    </footer>

    <script src="app.js"></script>
</body>
</html>
