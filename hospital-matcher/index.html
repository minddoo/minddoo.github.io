<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Korean Hospital Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6117526240662405" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1 id="page-title">🏥 Korean Hospital Guide</h1>
        <p id="page-subtitle">Where to go when you are sick in Korea</p>
        
        <div class="lang-selector">
            <button class="lang-btn active" onclick="changeLanguage('en', event)">English</button>
            <button class="lang-btn" onclick="changeLanguage('ja', event)">日本語</button>
            <button class="lang-btn" onclick="changeLanguage('zh', event)">中文</button>
            <button class="lang-btn" onclick="changeLanguage('th', event)">ภาษาไทย</button>
            <button class="lang-btn" onclick="changeLanguage('ru', event)">Русский</button>
            <button class="lang-btn" onclick="changeLanguage('vi', event)">Tiếng Việt</button>
        </div>
    </header>

    <div class="ad-container">AdSense Banner</div>

    <main>
        <div class="info-intro" id="info-intro">
            In Korea, you usually don't visit a General Practitioner. You go directly to a specialist clinic based on your symptoms. Find your symptoms below to know which clinic to visit.
        </div>

        <div class="info-list" id="info-list">
            <!-- Information blocks rendered here -->
        </div>
    </main>



    <script src="app.js"></script>


<!-- Visitor Counter -->
<div id="visitor-badge" style="position: fixed; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.95); padding: 5px 10px; border-radius: 8px; font-family: 'Pretendard', sans-serif; font-size: 10px; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #eaeaea; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; letter-spacing: 0.2px;">
  <span style="color: #888; font-weight: 600; margin-bottom: 2px; text-transform: uppercase;">Today <span id="v-today" style="color: #ff4757; font-weight: 800; margin-left: 4px;">...</span></span>
  <span style="color: #aaa; font-weight: 500; text-transform: uppercase;">Total <span id="v-total" style="color: #2f3542; font-weight: 700; margin-left: 4px;">...</span></span>
</div>
<script>
(function() {
  const SITE_ID = "minddoo_hospital-matcher";
  const BASE_TODAY = 98;
  const BASE_TOTAL = 37562;
  
  const d = new Date();
  const dateStr = d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  const todayId = SITE_ID + "_" + dateStr;

  function getCount(id, callback) {
    fetch("https://api.counterapi.dev/v1/" + id + "/up")
      .then(res => res.json())
      .then(data => callback(data.count))
      .catch(err => {
        let val = parseInt(localStorage.getItem(id) || "0") + 1;
        localStorage.setItem(id, val);
        callback(val);
      });
  }

  getCount(SITE_ID, function(total) {
    document.getElementById("v-total").innerText = (BASE_TOTAL + total).toLocaleString();
  });
  
  getCount(todayId, function(today) {
    document.getElementById("v-today").innerText = (BASE_TODAY + today).toLocaleString();
  });
})();
</script>

</body>
</html>
