<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>워너블 으랏가챠 다이어리</title>
    
    <!-- 귀여운 폰트 (Jua) -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css?v=12">

    <!-- Lunar Calendar JS (그대로 사용) -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6117526240662405" crossorigin="anonymous"></script>
</head>
<body>

    <div class="app-container">
        
        <header class="top-header">
            <h1>🌟 워너블 으랏가챠 다이어리 🌟</h1>
            <p>언제나 우리 마음속에 저장 📸</p>
        </header>

        <div class="house-wrapper">
            <div class="house-roof"></div>
            <div class="house-body">
                <!-- 해빗 트래커 (우리들의 약속) 영역 -->
                <section class="gacha-card room-pink habit-tracker">
            <div class="habit-header">
                <h2 class="room-title pink-title">🤙 약속해요 ~잊지 않겠다고</h2>
                <button class="btn-small" onclick="openGoalModal()">약속 정하기</button>
            </div>
            <div id="goal-info" class="goal-info" style="display:none;">
                <p class="goal-title" id="goal-title-display">매일 스밍 돌리기</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="goal-progress-bar"></div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <p class="goal-status" id="goal-status-display">진행률 0% (D-Day)</p>
                    <button class="btn-gacha-play" onclick="playGacha()">으랏가챠 돌리기 🕹️</button>
                </div>
            </div>
            <div id="no-goal-info" class="no-goal">
                <p>아직 정해진 약속이 없어요! 버튼을 눌러 새 약속을 만들어주세요 💖</p>
            </div>
        </section>

        <!-- 캘린더 영역 -->
        <section class="gacha-card room-cyan calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" onclick="prevMonth()">◀</button>
                <h2 id="month-display">2026년 6월</h2>
                <button class="nav-btn" onclick="nextMonth()">▶</button>
            </div>
            <div class="calendar-grid">
                <div class="weekday sun">일</div>
                <div class="weekday">월</div>
                <div class="weekday">화</div>
                <div class="weekday">수</div>
                <div class="weekday">목</div>
                <div class="weekday">금</div>
                <div class="weekday sat">토</div>
            </div>
            <div class="calendar-grid" id="calendar-days">
                <!-- 달력 날짜들이 자바스크립트로 생성됩니다 -->
            </div>
        </section>
            </div>
        </div>

        <!-- 음력/양력 변환기 영역 -->
        <section class="gacha-card lunar-section room-pink">
            <h2 class="room-title pink-title">🌙 음/양력 변환기</h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom:10px;">부모님 생신, 제사 챙기기!</p>
            <div class="lunar-controls">
                <div class="input-group">
                    <select id="lunar-type">
                        <option value="solar-to-lunar">양력 → 음력</option>
                        <option value="lunar-to-solar">음력 → 양력</option>
                    </select>
                    <input type="date" id="lunar-date-input" class="input-retro">
                </div>
                <button class="btn-primary" onclick="convertLunar()">변환 얍!</button>
            </div>
            <div id="lunar-result" class="lunar-result"></div>
        </section>

        <!-- 하단 광고 배너 영역 -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-6117526240662405"
                 data-ad-slot="1234567890" 
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

    </div>

    <!-- 스케줄 줍줍 (일정 모달) -->
    <div id="day-modal" class="modal-overlay">
        <div class="modal-content gacha-card mint-glass-card">
            <div class="modal-header">
                <h2 id="modal-date-title">2026. 06. 04</h2>
                <button class="close-btn" onclick="closeDayModal()">❌</button>
            </div>
            
            <div id="modal-goal-section" class="modal-section" style="display:none;">
                <h3>🤙 오늘의 약속 달성!</h3>
                <label class="custom-checkbox">
                    <input type="checkbox" id="goal-checkbox" onchange="toggleGoalCheck()">
                    <span class="checkmark"></span>
                    <span id="modal-goal-text">약속 텍스트</span>
                </label>
            </div>

            <div class="modal-section">
                <h3>🗓️ 저장된 스케줄</h3>
                <ul id="event-list" class="event-list"></ul>
            </div>

            <div class="modal-section new-event-section">
                <h3>새 스케줄 줍줍 💖</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="new-event-title" placeholder="스케줄을 입력하세요!" class="input-retro" style="flex:1;">
                    <button class="btn-primary" onclick="addEvent()">저장장</button>
                </div>
            </div>

            <button class="btn-complete w-100 mt-10" onclick="closeDayModal()">완료 🌟</button>
        </div>
    </div>

    <!-- 약속 설정 모달 -->
    <div id="goal-modal" class="modal-overlay">
        <div class="modal-content gacha-card mint-glass-card">
            <div class="modal-header">
                <h2>👀 워너원이 보고있다</h2>
                <button class="close-btn" onclick="closeGoalModal()">❌</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>약속 이름 (예: 스밍 돌리기)</label>
                    <input type="text" id="goal-input-title" class="input-retro" placeholder="약속 입력">
                </div>
                <div class="form-group">
                    <label>언제까지? (D-Day)</label>
                    <input type="date" id="goal-input-date" class="input-retro">
                </div>
                <div class="form-group">
                    <label>나에게 주는 보상들 🎁<br><span style="font-size:0.9rem; color:#aaa;">(엔터로 여러 개 적어주세요!)</span></label>
                    <textarea id="goal-input-rewards" class="input-retro" rows="3" placeholder="치킨 시켜먹기&#10;굿즈 사기&#10;하루종일 뒹굴기"></textarea>
                </div>
                <button class="btn-primary w-100" onclick="saveGoal()">저장할래 💖</button>
                <button class="btn-danger w-100 mt-10" onclick="deleteGoal()">삭제할래 🗑️</button>
            </div>
        </div>
    </div>

    <!-- 으랏가챠 팝업 모달 -->
    <div id="gacha-modal" class="modal-overlay">
        <div class="modal-content gacha-card" style="text-align:center; padding: 20px;">
            <div class="modal-header" style="justify-content: center; margin-bottom: 15px;">
                <h2 style="color: black; text-shadow: none;">🎰 으랏차차 가챠 🎰</h2>
                <button class="close-btn" style="position:absolute; right:20px;" onclick="closeGachaModal()">❌</button>
            </div>
            
            <div id="gacha-machine-container" style="width: 160px; height: 200px; margin: 0 auto; position: relative;">
                <svg width="100%" height="100%" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(4px 4px 0px #000); overflow: visible;">
                    <rect x="20" y="60" width="60" height="60" rx="5" fill="#4facfe" stroke="#111" stroke-width="4"/>
                    <rect x="35" y="75" width="30" height="30" rx="3" fill="#ecf0f1" stroke="#111" stroke-width="3"/>
                    <rect x="45" y="80" width="10" height="15" rx="2" fill="#bdc3c7" stroke="#111" stroke-width="2"/>
                    <rect x="40" y="105" width="20" height="15" fill="#bdc3c7" stroke="#111" stroke-width="3"/>
                    <rect x="45" y="105" width="10" height="10" fill="#111"/>
                    
                    <circle cx="50" cy="35" r="30" fill="rgba(255,255,255,0.9)" stroke="#111" stroke-width="4"/>
                    
                    <g id="gacha-capsules-group" style="transform-origin: 50px 35px;">
                        <circle cx="35" cy="45" r="7" fill="#ff9ff3" stroke="#111" stroke-width="2"/>
                        <circle cx="50" cy="50" r="7" fill="#feca57" stroke="#111" stroke-width="2"/>
                        <circle cx="65" cy="45" r="7" fill="#54a0ff" stroke="#111" stroke-width="2"/>
                        <circle cx="45" cy="30" r="7" fill="#55efc4" stroke="#111" stroke-width="2"/>
                        <circle cx="55" cy="22" r="7" fill="#ff9ff3" stroke="#111" stroke-width="2"/>
                    </g>
                    
                    <path d="M 30 20 Q 40 10 50 10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                    <rect x="40" y="2" width="20" height="5" rx="2" fill="#ff4757" stroke="#111" stroke-width="3"/>
                </svg>
                <div id="dropped-capsule" style="display:none; position:absolute; bottom: -10px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; text-shadow: 2px 2px 0 #000;">🔴</div>
            </div>

            <div id="gacha-result-box" style="display:none; background: #fff; border: 3px solid #000; border-radius: 12px; padding: 15px; margin: 15px 0; box-shadow: 3px 3px 0 #000;">
                <div style="font-size: 2rem; animation: pop 0.3s ease-out;">🎉</div>
                <div id="gacha-reward-text" style="color:var(--pop-pink); font-size: 1.2rem; font-weight:bold; margin-top:5px;"></div>
            </div>

            <p id="gacha-result-text" style="margin: 15px 0; font-size:1.2rem; color:var(--text-main); font-weight:bold;">버튼을 눌러 뽑기를 시작하세요!</p>
            <button id="gacha-action-btn" class="btn-complete w-100" style="background: var(--pop-cyan); color: white;" onclick="startGachaRoll()">으랏가챠!</button>
        </div>
    </div>

    <script src="app.js?v=12"></script>
</body>
</html>
