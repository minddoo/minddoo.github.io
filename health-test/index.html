<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Medical Checkup Style Test | Discover Your Ideal Health Package in Korea</title>
    <meta name="description" content="Planning a medical trip to Korea? Take our 2-minute quiz to find out which K-Medical Health Checkup style matches your lifestyle, priorities, and budget.">

    <!-- CSS -->

</head>
<body>
    <div class="app-container">
        
        <!-- Start Screen -->
        <section id="screen-start" class="screen active text-center">
            <div class="badge">K-Medical Tourism</div>
            <h1 class="main-title">What is your<br><span class="highlight">K-Medical</span><br>Checkup Style? 🏥</h1>
            <div class="main-image">
                <img src="https://minddoo.github.io/health-test/og-image-medical.png" alt="Medical Tourism Illustration" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0iI2YyZjJmMiIvPjwvc3ZnPg=='" style="width:100%; max-width:320px; border-radius:24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin:20px 0;">
            </div>
            <p class="subtitle">Take this 2-minute quiz to discover the perfect Korean health screening package tailored to your priorities and lifestyle.</p>
            
            <button class="btn-primary" onclick="startTest()">Start Quiz</button>

            <!-- AdSense Banner -->
            <div class="ad-container" style="margin-top: 30px;">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-6117526240662405"
                     data-ad-slot="1234567890" 
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </section>

        <!-- Question Screen -->
        <section id="screen-question" class="screen">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="question-count">Question <span id="q-num">1</span> / 7</div>
            
            <h2 id="question-text" class="question-title">Question goes here...</h2>
            
            <div class="options-container" id="options-container">
                <!-- Options will be generated by JS -->
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
