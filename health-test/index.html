<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Medical Checkup Style Test</title>
    <meta name="description" content="Discover your ideal Korean health screening package!">
    <meta property="og:title" content="What is your K-Medical Checkup Style?">
    <meta property="og:image" content="https://minddoo.github.io/health-test/og-image-medical.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6117526240662405" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Language Selector -->
        <div class="lang-selector-container">
            <select id="lang-select" class="lang-select">
                <option value="en">🇺🇸 English</option>
                <option value="ko">🇰🇷 한국어</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="zh">🇨🇳 中文</option>
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="th">🇹🇭 ภาษาไทย</option>
                <option value="ru">🇷🇺 Русский</option>
            </select>
        </div>

        <!-- Start Screen -->
        <section id="screen-start" class="screen active text-center">
            <div class="badge" data-i18n="badge">K-Medical Tourism</div>
            <h1 class="main-title" data-i18n="title">What is your<br><span class="highlight">K-Medical</span><br>Checkup Style? 🏥</h1>
            <div class="main-image">
                <img src="https://minddoo.github.io/health-test/og-image-medical.png" alt="Medical Tourism" onerror="this.style.display='none'" style="width:100%; max-width:320px; border-radius:24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin:10px 0 20px;">
            </div>
            <p class="subtitle" data-i18n="subtitle">Take this 2-minute quiz to discover the perfect Korean health screening package tailored to your priorities and lifestyle.</p>
            
            <button class="btn-primary" onclick="startTest()" data-i18n="btnStart">Start Quiz</button>

            <!-- AdSense Banner -->
            <div class="ad-container" style="margin-top: 30px;">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-6117526240662405"
                     data-ad-slot="1234567890" 
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </section>

        <!-- Question Screen -->
        <section id="screen-question" class="screen">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="question-count"><span data-i18n="qLabel">Question</span> <span id="q-num">1</span> / 7</div>
            
            <h2 id="question-text" class="question-title">Loading...</h2>
            
            <div class="options-container" id="options-container">
                <!-- Options will be generated by JS -->
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button id="btn-back" class="btn-back" onclick="goBack()" style="display:none;" data-i18n="btnBack">← Back</button>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
