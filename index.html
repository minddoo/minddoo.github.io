<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7일 완성 필수 영단어 챌린지!</title>
    
    <!-- Google Fonts: 귀여운 'Jua' 폰트와 영문 'Baloo 2' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Jua&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🌟 7일 완성 단어 챌린지 🌟</div>
        <button id="btn-go-home" class="btn-home" style="display: none;">🏠 홈으로</button>
    </header>

    <!-- 상단 광고 영역 -->
    <div class="ad-container ad-top">
        <div class="ad-placeholder">AdSense Banner<br>(Top)</div>
    </div>

    <main class="app-container">
        <!-- 메인 화면: Day 선택 -->
        <section id="screen-home" class="screen active">
            <div class="intro-box">
                <h2>매일 10단어씩 딱 7일!</h2>
                <p>기초부터 탄탄하게! 하루 10단어 외우기에 도전해보세요.</p>
            </div>
            
            <div class="day-grid" id="day-grid">
                <!-- Day 1 ~ Day 7 카드가 자바스크립트로 생성됩니다 -->
            </div>

            <div class="final-test-box">
                <button id="btn-final-test" class="btn-cute btn-purple btn-large">🏆 최종 주간 테스트 보기</button>
                <p class="helper-text">70개 단어 중 20개가 무작위로 출제됩니다!</p>
            </div>
        </section>

        <!-- 단어 학습 화면 -->
        <section id="screen-study" class="screen">
            <div class="study-card">
                <h2 id="study-title">Day 1 학습하기 📖</h2>
                <ul id="study-list" class="study-list">
                    <!-- 단어 10개가 여기에 표시됩니다 -->
                </ul>
                <div class="action-buttons">
                    <button id="btn-start-daily" class="btn-cute btn-green btn-large">이 단어로 퀴즈 보기 🎮</button>
                </div>
            </div>
        </section>

        <!-- 퀴즈 화면 -->
        <section id="screen-quiz" class="screen">
            <div class="progress-box">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="quiz-header">
                <span id="question-count" class="badge">문제 1 / 10</span>
                <div class="timer-box">⏰ <span id="timer">15</span>초</div>
            </div>
            
            <div class="question-card">
                <h2 id="question-word" class="word-display">Loading...</h2>
            </div>

            <!-- 중간 광고 영역 -->
            <div class="ad-container ad-mid">
                <div class="ad-placeholder-small">Ad</div>
            </div>

            <div class="options-grid" id="options-container">
                <!-- 옵션 버튼들 -->
            </div>
        </section>

        <!-- 결과 화면 -->
        <section id="screen-result" class="screen">
            <div class="result-card">
                <h2 id="result-title">🎉 퀴즈 완료! 🎉</h2>
                <div class="final-score" id="final-score">0점</div>
                <p id="result-message">수고하셨어요!</p>
                
                <div class="action-buttons">
                    <button id="btn-restart-quiz" class="btn-cute btn-blue">다시 풀기 🔄</button>
                    <button id="btn-result-home" class="btn-cute btn-pink">메인으로 가기 🏠</button>
                </div>
            </div>
        </section>
    </main>

    <!-- 하단 광고 영역 -->
    <div class="ad-container ad-bottom">
        <div class="ad-placeholder">AdSense Banner<br>(Bottom)</div>
    </div>

    <footer>
        <p>&copy; 2026 7-Day Vocab Challenge. Keep studying!</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
