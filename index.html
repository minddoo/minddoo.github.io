<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 귀여운 단어장 퀴즈!</title>
    
    <!-- Google Fonts: 귀여운 'Jua' 폰트와 영문 'Baloo 2' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Jua&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🍎 My Vocab Quiz 🌟</div>
        <div class="nav-tabs">
            <button id="tab-manager" class="tab-btn active">📝 내 단어장</button>
            <button id="tab-quiz" class="tab-btn">🎮 퀴즈 시작</button>
        </div>
    </header>

    <!-- 상단 광고 영역 -->
    <div class="ad-container ad-top">
        <div class="ad-placeholder">AdSense Banner<br>(Top)</div>
    </div>

    <main class="app-container">
        <!-- 단어장 관리 화면 -->
        <section id="screen-manager" class="screen active">
            <div class="input-card">
                <h2>새로운 단어 추가하기 ✨</h2>
                <div class="input-group">
                    <input type="text" id="input-word" placeholder="영어 단어 (예: apple)" autocomplete="off">
                    <input type="text" id="input-meaning" placeholder="뜻 (예: 사과)" autocomplete="off">
                    <button id="btn-add" class="btn-cute btn-green">추가!</button>
                </div>
            </div>

            <div class="word-list-card">
                <div class="list-header">
                    <h3>📚 이번 주 내 단어 목록</h3>
                    <span id="word-count" class="badge">총 0개</span>
                </div>
                <p class="helper-text">※ 퀴즈를 보려면 최소 4개의 단어가 필요해요!</p>
                <ul id="word-list" class="word-list">
                    <!-- 단어 목록이 여기에 표시됩니다 -->
                </ul>
            </div>
        </section>

        <!-- 퀴즈 화면 -->
        <section id="screen-quiz" class="screen">
            <div class="progress-box">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="quiz-header">
                <span id="question-count" class="badge">문제 1 / 10</span>
                <div class="timer-box">⏰ <span id="timer">15</span>초</div>
            </div>
            
            <div class="question-card">
                <h2 id="question-word" class="word-display">Loading...</h2>
            </div>

            <!-- 중간 광고 영역 -->
            <div class="ad-container ad-mid">
                <div class="ad-placeholder-small">Ad</div>
            </div>

            <div class="options-grid" id="options-container">
                <!-- 옵션 버튼들 -->
            </div>
        </section>

        <!-- 결과 화면 -->
        <section id="screen-result" class="screen">
            <div class="result-card">
                <h2>🎉 테스트 완료! 🎉</h2>
                <div class="final-score" id="final-score">0점</div>
                <p id="result-message">수고하셨어요!</p>
                
                <div class="action-buttons">
                    <button id="btn-restart" class="btn-cute btn-blue">다시 풀기 🔄</button>
                    <button id="btn-go-manager" class="btn-cute btn-pink">단어장 가기 📝</button>
                </div>
            </div>
        </section>
    </main>

    <!-- 하단 광고 영역 -->
    <div class="ad-container ad-bottom">
        <div class="ad-placeholder">AdSense Banner<br>(Bottom)</div>
    </div>

    <footer>
        <p>&copy; 2026 My Vocab Quiz. Have fun studying!</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
